<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchViz-XR — VR Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080810; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    #info {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; pointer-events: none; white-space: nowrap;
    }
    #stats {
      position: absolute; top: 16px; left: 20px;
      color: rgba(255,255,255,0.4); font-size: 11px; pointer-events: none;
    }
    #tooltip {
      position: absolute; display: none;
      background: rgba(10,10,25,0.88); border: 1px solid rgba(100,160,255,0.25);
      border-radius: 8px; padding: 8px 14px; color: #fff; font-size: 13px;
      pointer-events: none; max-width: 220px; backdrop-filter: blur(6px);
    }
    #tooltip .type-tag {
      display: inline-block; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 2px 8px; border-radius: 10px; margin-bottom: 4px;
    }
    #info-panel {
      display: none; position: absolute; top: 50%; left: 20px;
      transform: translateY(-50%);
      background: rgba(10,10,30,0.92); border: 1px solid rgba(100,160,255,0.3);
      border-radius: 12px; padding: 16px 20px; min-width: 200px;
      backdrop-filter: blur(8px); color: #fff;
    }
    #info-panel .panel-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(100,160,255,0.6); margin-bottom: 10px;
    }
    #info-name {
      font-size: 15px; font-weight: 600; margin-bottom: 8px;
      color: #e8eeff; line-height: 1.3;
    }
    #info-type {
      display: inline-block; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 3px 10px; border-radius: 12px;
      margin-bottom: 8px; color: #fff;
    }
    #info-id {
      font-size: 11px; color: rgba(255,255,255,0.35);
      margin-bottom: 6px; word-break: break-all;
    }
    #info-connections { font-size: 12px; color: rgba(100,200,255,0.7); }
    #info-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 16px; cursor: pointer;
    }
    #info-close:hover { color: #fff; }
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #080810;
      color: rgba(255,255,255,0.6); font-size: 14px; letter-spacing: 0.1em;
      gap: 16px; transition: opacity 0.5s;
    }
    .dot-row { display: flex; gap: 8px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #378ADD;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%,100% { opacity:0.2; transform:scale(0.8); }
      50%      { opacity:1;   transform:scale(1.2); }
    }
    #legend {
      position: absolute; bottom: 90px; left: 20px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:11px; color:rgba(255,255,255,0.45); }
    .legend-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    #bottom-bar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center;
    }
    .bar-btn {
      background: #1a1a3a; border: 1px solid rgba(100,160,255,0.3);
      color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 24px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap;
    }
    .bar-btn:hover    { background: #2a2a5a; border-color: rgba(100,160,255,0.6); }
    .bar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #voice-status {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.45); pointer-events: none; white-space: nowrap;
    }
    #voice-answer-box {
      display: none; position: absolute; bottom: 110px; right: 20px;
      background: rgba(10,10,30,0.9); border: 1px solid rgba(100,160,255,0.25);
      border-radius: 10px; padding: 12px 16px; max-width: 300px; backdrop-filter: blur(6px);
    }
    .answer-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(100,160,255,0.6); margin-bottom: 6px;
    }
    #voice-answer { font-size: 13px; color: #e8eeff; line-height: 1.5; }
    #hint {
      position: absolute; bottom: 70px; right: 20px;
      font-size: 11px; color: rgba(255,255,255,0.3); pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div>ARCHVIZ — XR</div>
    <div class="dot-row">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div id="info">Drag to orbit · Scroll to zoom · Click a node to inspect</div>
  <div id="stats" style="display:none">
    Nodes: <span id="node-count">0</span> &nbsp;|&nbsp; Edges: <span id="edge-count">0</span>
  </div>

  <div id="tooltip">
    <div class="type-tag" id="tt-type"></div>
    <div id="tt-label" style="font-weight:600;margin-top:2px"></div>
    <div id="tt-id"    style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px"></div>
  </div>

  <div id="info-panel">
    <button id="info-close" onclick="resetHighlight()">✕</button>
    <div class="panel-title">Selected Node</div>
    <div id="info-name"></div>
    <div id="info-type"></div>
    <div id="info-id"></div>
    <div id="info-connections"></div>
  </div>

  <div id="legend" style="display:none">
    <div class="legend-item"><div class="legend-dot" style="background:#5DCAA5"></div>Component</div>
    <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>Layer</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>Process</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E06FBF"></div>Named Entity</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff;opacity:0.5"></div>Flow Pulse</div>
  </div>

  <div id="voice-answer-box">
    <div class="answer-label">Answer</div>
    <div id="voice-answer"></div>
  </div>

  <div id="voice-status">Press 🎤 Ask and speak a question</div>
  <div id="hint">Press Esc to deselect</div>

  <div id="bottom-bar">
    <button class="bar-btn" id="mic-btn" onclick="toggleMic()">🎤 Ask</button>
    <button class="bar-btn" id="vr-btn">⌛ Checking VR...</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="main.js"></script>
</body>
</html>
